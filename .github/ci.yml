name: SWI CI Pipeline

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test

      - name: Run determinism checks
        run: npm run test:determinism

      - name: Run PBFT simulation tests
        run: npm run test:pbft

      - name: Run ZK verification tests
        run: npm run test:zk
