name: Formal Model Check

on:
  push:
    paths:
      - "packages/formal-models/**"
      - "*.tla"
      - "*.als"

jobs:
  tla-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run TLA+ model checker
        run: |
          java -jar tla2tools.jar SWI_v5.tla -config SWI.cfg
