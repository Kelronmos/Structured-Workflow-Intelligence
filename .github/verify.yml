name: SWI Verification Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: npm ci

    - name: Check signatures and hashes
      run: npm test

    - name: Verify Types
      run: npx tsc --noEmit

    - name: Generate SWI Report
      run: |
        echo "Capturing system state..."
        node scripts/generate_report.js > swi_report.txt

    - name: Generate SHA256
      run: |
        sha256sum dist/* > checksums.txt

    - name: Sign Checksums
      run: |
        gpg --detach-sign checksums.txt

    - name: Upload Verification Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: verification
        path: |
          checksums.txt
          checksums.txt.sig
